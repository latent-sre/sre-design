# Canonical Tier-B skill pipeline (DEEP-COMPARISON R6 / HYBRID-PLAN §9.6).
#
# Every skill directory under .github/skills/ must appear here exactly once, and vice-versa.
# tools/lint_skills.py + tests/test_lint_skills.py enforce it (CI-blocking), so the skill suite and
# this manifest can't drift. Phases follow the classify -> map -> assess -> generate shape of the
# resiliency-skills suite; `generate` opens with sre-generate-slos (DEEP R7).
# `consume` is the post-publish, read-only operator side (an incident responder reads the KB the
# authoring phases produced) — listed here so the manifest stays exhaustive.
apiVersion: sre.kb/v1alpha1
kind: SkillPipeline
phases:
  orchestrate:
    - sre-autopilot
  classify:
    - sre-criticality
  map:
    - sre-flow-analysis
    - sre-estate
    - map-messaging
    - map-api-contracts
    - map-architecture
  assess:
    - sre-gap-finder
    - sre-confirm-boundaries
    - sre-observability-coverage
    - sre-assess-logging
    - sre-blast-radius
    - sre-prr-review
    - sre-security-posture
    - sre-pcf-review
  generate:
    - sre-generate-slos
    - sre-generate-dashboards
    - generate-alerts
    - generate-runbooks
    - sre-narrate-diagrams
  consume:
    - sre-incident-response
