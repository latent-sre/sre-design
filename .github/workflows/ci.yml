name: CI

# Runs the project's own dev checks (the Makefile targets) on every push to main and every PR,
# so a regression can't merge silently — and so the PR-watch / auto-fix loop has signal to act on.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install (make install)
        run: make install
      - name: Lint (make lint)
        run: make lint
      - name: Test (make test)
        run: make test

  # Supply-chain integrity (HYBRID-PLAN R8): the runtime deps install ONLY from the pinned, hashed
  # lockfile — a tampered or unexpected artifact fails the hash check. Regenerate with `make lock`.
  lockfile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Hash-verified install of the locked runtime deps
        run: python -m pip install --require-hashes -r requirements.lock

  # Independent second secret gate (HYBRID-PLAN R8 / §9.3 #5): detect-secrets over the whole repo,
  # complementing the engine's own publish-time scan. New secrets (not in .secrets.baseline) fail.
  # Re-audit the baseline with: detect-secrets scan > .secrets.baseline
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: python -m pip install detect-secrets
      - name: detect-secrets second gate
        run: >-
          git ls-files | grep -vE '^(requirements\.lock|\.secrets\.baseline)$'
          | xargs detect-secrets-hook --baseline .secrets.baseline
