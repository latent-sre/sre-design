# Base configuration for the sre-kb engine. Overlaid by env vars
# (prefix SRE_KB_, nested via __). Secrets come ONLY from env, never this file.

paths:
  work_root: .work
  schemas: schemas
  registry: schemas/registry.yaml
  prompts: prompts
  output_templates: output_templates

# Validation gating thresholds (see validation pipeline).
gating:
  verified_min_confidence: 0.7
  # status=verified additionally requires at least one provenance-verified evidence item.
  require_verified_provenance: true

# Which collectors are enabled. A profile (config/profiles/*.yaml) can narrow this.
collectors:
  enabled: [common, java_spring]

# Render: which monitoring backends to emit Alert exprs for (render/alerts.py adapters). Prometheus
# (PromQL) + Splunk (SPL) are the byte-grounded dialects; Wavefront (WQL) + AppDynamics (a structured
# Health Rule) are rendered only where they map faithfully to the alert intent and clearly labelled
# where the mechanism differs from a budget burn-rate. Narrow this to the tools you actually run.
render:
  alert_tools: [prometheus, splunk, wavefront, appdynamics]

# Tier-B LLM gap-finder (HYBRID-PLAN §7.9). Noise budget: keep at most this many confirmed gaps
# per run, highest-severity first, so a cry-wolf run can't flood a reviewer. ~ (null) = no cap.
# `max_novel` is the separate, tighter budget for out-of-taxonomy (novel) discoveries — the
# open-discovery channel is an open invitation, so it earns less reviewer attention per run.
gap_finder:
  max_candidates: 25
  max_novel: 3

# Graduation loop (HYBRID-PLAN §9.3 #3): a gap category a reviewer confirms (`sre-kb confirm-gap`)
# this many times, with zero false positives, becomes a promotion candidate — the engine then drafts
# a deterministic signature for a human to review and merge (assisted, never auto-applied).
graduation:
  confirmation_threshold: 5

# Service discovery fan-out cap (DEEP-COMPARISON R8): `sre-kb plan` / `run-plan` refuse to scan a repo
# with more than this many discovered services before producing any artifacts. ~ (null) = no cap.
scan:
  max_services: 50

# Publish defaults (forge selected at publish time; token comes from env).
publish:
  forge: github
  dry_run_default: true
  # Where the generated validate-sre-kb.yml installs the pinned engine from. sre-kb is not on
  # public PyPI: set engine_index_url to your internal index (or engine_spec to a direct wheel
  # URL/path) before the first live publish — the generated CI fails on install without it.
  engine_index_url: ~
  engine_spec: ~  # default: sre-kb==<engine version>
  # Live publishes (--no-dry-run) may only target repos on this allowlist (owner/repo or a
  # GitHub URL). Empty list = block every live publish until you add your SRE repo here, so
  # a misconfigured target or a stray token can't push anywhere (safe by default). Dry-runs
  # are unaffected. Set to ~ (null) to disable the allowlist entirely (not recommended).
  allowed_repos: []
  # Fan-out cap: refuse to assemble a PR with more than this many artifacts, so a runaway or
  # compromised scan can't flood a target repo. Set to ~ (null) to disable.
  max_artifacts: 1000
