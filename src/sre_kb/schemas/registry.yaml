# Kind registry — the extensibility backbone.
# Maps each apiVersion/kind to its schema, the collector(s) that produce its facts,
# the prompt domain that drives Copilot synthesis, the validator, and its phase.
# Adding a kind = a schema file + a prompt + (optional) collector + (optional) renderer + one row here.
apiVersion: sre.kb/v1alpha1

envelope:
  schema: schemas/_envelope.schema.json

kinds:
  # --- P1 vertical slice: Flow -> Alert -> Runbook (+ supporting) ---
  Flow:
    schema: schemas/v1alpha1/Flow.schema.json
    collectors: [java_spring.flow_builder]
    prompt: flow
    phase: P1
    renderer: diagram   # -> projections/diagrams/<name>.mmd (Mermaid sequence)
  ResiliencyPattern:
    schema: schemas/v1alpha1/ResiliencyPattern.schema.json
    collectors: [java_spring.resiliency]
    prompt: resiliency
    phase: P1
  Observability:
    schema: schemas/v1alpha1/Observability.schema.json
    collectors: [java_spring.observability, java_spring.log_statements]
    prompt: observability
    phase: P1        # logging sub-section in P1; metrics/traces/health in P2
  Fallback:
    schema: schemas/v1alpha1/Fallback.schema.json
    collectors: [java_spring.resiliency]
    prompt: fallback
    phase: P1
  Alert:
    schema: schemas/v1alpha1/Alert.schema.json
    collectors: []   # derived from Flow + Observability + ResiliencyPattern
    prompt: alert
    phase: P1
  Runbook:
    schema: schemas/v1alpha1/Runbook.schema.json
    collectors: []   # derived from Flow + Alert + BlastRadius
    prompt: runbook
    phase: P1
    renderer: runbook   # -> projections/runbooks/<name>.md
  BlastRadius:
    schema: schemas/v1alpha1/BlastRadius.schema.json
    collectors: [flow.callgraph]   # minimal single-service in P1
    prompt: blast-radius
    phase: P1
  SloSli:
    schema: schemas/v1alpha1/SloSli.schema.json
    collectors: [java_spring.config_props]
    prompt: slo
    phase: P1        # minimal detect-or-needs-review
  ReadinessScore:
    schema: schemas/v1alpha1/ReadinessScore.schema.json
    collectors: []   # roll-up over the other artifacts
    prompt: null
    phase: P1        # coverage roll-up in P1; full PRR in P2
  ServiceCatalogEntry:
    schema: schemas/v1alpha1/ServiceCatalogEntry.schema.json
    collectors: []
    prompt: null
    phase: P1

  # --- P2 breadth ---
  TechStack:        { schema: schemas/v1alpha1/TechStack.schema.json,        phase: P2 }
  Architecture:     { schema: schemas/v1alpha1/Architecture.schema.json,     phase: P2 }
  Deployment:       { schema: schemas/v1alpha1/Deployment.schema.json,       phase: P2 }
  Dependency:       { schema: schemas/v1alpha1/Dependency.schema.json,       phase: P2 }
  # Built from detected endpoints/channels; common.openapi ingests an existing OpenAPI/AsyncAPI spec
  # (if present) to add contract-drift (documented vs detected, #7).
  Interface:
    schema: schemas/v1alpha1/Interface.schema.json
    collectors: [common.openapi]
    phase: P2
  # Consumer-side async-resilience posture (HYBRID-PLAN S3). Interface carries the messaging
  # *contract*; Messaging carries each consumer's DLQ/retry/idempotency mechanisms (Tier-A). The
  # judgment calls (ordering/partition, poison-pill, saga) route to the map-messaging skill (Tier-B).
  Messaging:
    schema: schemas/v1alpha1/Messaging.schema.json
    collectors: [java_spring.messaging]
    prompt: messaging
    phase: P2
  ScheduledJob:     { schema: schemas/v1alpha1/ScheduledJob.schema.json,     phase: P2 }
  DeliveryPipeline:
    schema: schemas/v1alpha1/DeliveryPipeline.schema.json
    collectors: [common.delivery_pipeline]
    phase: P2
  Topology:
    schema: schemas/v1alpha1/Topology.schema.json
    phase: P2
    renderer: topology   # -> projections/diagrams/<name>-topology.mmd (Mermaid graph)
  FeatureFlag:
    schema: schemas/v1alpha1/FeatureFlag.schema.json
    collectors: [common.feature_flags]
    phase: P2
  # DataStore folded into Dependency (S1, SCOPE §5): a datastore binding is a Dependency carrying its
  # `engine`; the infra fields (backup/RPO/RTO) are platform-DR an app team doesn't own.
  ConfigManagement: { schema: schemas/v1alpha1/ConfigManagement.schema.json, phase: P2 }

  # --- P5 render-adapter breadth (HYBRID-PLAN §9.6 — adopted from resiliency-skills) ---
  # Derived by the scaffolder (no collector); rendered per backend via the render/ adapter seam.
  Dashboard:        { schema: schemas/v1alpha1/Dashboard.schema.json,        phase: P5 }

  # --- Criticality reliability spine (HYBRID-PLAN Round-3 R1–R3 — adopted from resiliency-skills) ---
  # tier/businessCriticality are declared (catalog/human, grounded to the declaring file);
  # dataClassification is re-derived deterministically from PII/PCI signatures in code. Drives the
  # deterministic alert severity floor (R2). Tier-B proposals (assess-criticality-and-data) land
  # needs-review and never feed the floor — only a grounded tier does.
  Criticality:
    schema: schemas/v1alpha1/Criticality.schema.json
    collectors: [common.criticality]
    prompt: assess-criticality-and-data
    phase: P2

  # --- P4 Tier-B (LLM): gap-finder (HYBRID-PLAN §7.9/§7.10) ---
  # Produced by the LLM gap-finder (collectors/llm.gap_finder) and re-grounded by the engine via
  # the shared signature library. The prompt is the vendored assess-resiliency skill
  # (.github/skills/sre-gap-finder). Always needs-review — nothing the LLM proposes auto-verifies.
  ResiliencyGap:
    schema: schemas/v1alpha1/ResiliencyGap.schema.json
    collectors: [llm.gap_finder]
    prompt: assess-resiliency
    phase: P4

  # --- P3/P4 (incl. deferred security workstream) ---
  # SecurityPosture kept (S1): its schema is already app-scoped — authn/authz/secrets/controls, with
  # no infra-security fields to drop (the SCOPE §5 "trim to app controls" is already satisfied).
  # DrBackup, NetworkTopology, RateLimiting dropped (S1, SCOPE §5): platform-infra concerns an app
  # team doesn't own (DR/backup, platform networking) or already a resilience signature (rate-limit).
  # Rolled up deterministically from byte-grounded facts (security deps, authz annotations,
  # actuator exposure); the deeper judgment calls stay with the sre-security-posture skill.
  SecurityPosture:
    schema: schemas/v1alpha1/SecurityPosture.schema.json
    collectors: [java_spring.annotations, java_spring.build, java_spring.config_props]
    phase: P3
