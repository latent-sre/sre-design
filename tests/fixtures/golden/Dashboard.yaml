kind: Dashboard
metadata:
  name: order-service-overview
  service: order-service
  labels: {}
  annotations: {}
spec:
  title: order-service — service overview (RED)
  renderTarget: prometheus
  panels:
  - title: Request rate
    type: timeseries
    unit: req/s
    signal:
      source: prometheus
      metric: http_server_requests_seconds_count
      description: 'throughput (RED: Rate)'
      query: sum(rate(http_server_requests_seconds_count{uri="/api/v1/orders"}[5m]))
  - title: Error fraction
    type: timeseries
    unit: percentunit
    signal:
      source: prometheus
      metric: http_server_requests_seconds_count
      description: 'fraction of non-SUCCESS responses (RED: Errors)'
      query: sum(rate(http_server_requests_seconds_count{uri="/api/v1/orders",outcome!="SUCCESS"}[5m]))
        / sum(rate(http_server_requests_seconds_count{uri="/api/v1/orders"}[5m]))
  - title: Latency p99
    type: timeseries
    unit: s
    signal:
      source: prometheus
      metric: http_server_requests_seconds_bucket
      description: 'request-duration percentile from the histogram (RED: Duration)'
      query: histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{uri="/api/v1/orders"}[5m]))
        by (le))
