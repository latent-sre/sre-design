openapi: 3.0.3
info:
  title: Orders API
  version: 1.1.0
paths:
  /api/v1/orders:
    get:
      operationId: listOrders
      responses:
        "200": { description: ok }
    post:
      operationId: createOrder
      responses:
        "201": { description: created }
  /api/v1/orders/{id}/cancel:
    post:
      operationId: cancelOrder
      responses:
        "200": { description: ok }
