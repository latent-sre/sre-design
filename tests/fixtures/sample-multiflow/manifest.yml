---
applications:
  - name: account-service
    instances: 2
    memory: 512M
    buildpacks:
      - java_buildpack_offline
    stack: cflinuxfs4
    routes:
      - route: account-service.apps.internal
    services:
      - accounts-db
    health-check-type: http
    health-check-http-endpoint: /actuator/health
